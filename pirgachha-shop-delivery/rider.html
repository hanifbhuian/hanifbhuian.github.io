<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0f766e" />
  <title>Rider Update | Pirgachha Shop & Delivery</title>
  <link rel="manifest" href="manifest-rider.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap nav-wrap">
      <a class="brand" href="rider.html"><div class="brand-mark">PSD</div><div><h1>Pirgachha Rider App</h1><p>Status update • Receipt upload • Delivery proof</p></div></a>
      <button id="manualInstallBtn" class="ghost" type="button">Install Rider App</button>
    </div>
  </header>
  <main class="page-main">
    <section class="wrap page-heading rider-heading">
      <p class="eyebrow">Delivery Rider</p>
      <h2>Update order status quickly.</h2>
      <p>Riders can update delivery status and attach the shopping money receipt after purchasing items.</p>
    </section>
    <section class="wrap order-shell simple-shell">
      <form id="riderForm" class="order-form fancy-form" data-order-type="rider">
        <div class="grid two">
          <label>Order ID
            <input name="orderId" type="text" inputmode="numeric" pattern="[0-9]*" required placeholder="Example: 1234567890" />
          </label>
          <label>Rider Name
            <input name="rider" type="text" required placeholder="Rider name" />
          </label>
        </div>
        <label>Status
          <select name="status" required>
            <option>Accepted order</option>
            <option>Collected from shop/restaurant/pharmacy</option>
            <option>On the way</option>
            <option>Delivered</option>
            <option>Cancelled/Problem</option>
          </select>
        </label>
        <label>Money Receipt Photo/File <span class="muted">optional</span>
          <input name="receiptFile" type="file" accept="image/*,.pdf" />
          <span class="help-text">Attach the shopping receipt after purchasing items. Image or PDF, maximum 5 MB.</span>
        </label>
        <label>Note <span class="muted">optional</span>
          <textarea name="note" rows="3" placeholder="Payment collected, total shopping cost, customer unavailable, delivery proof note, etc."></textarea>
        </label>
        <button class="btn big-submit" type="submit">Send Rider Update</button>
      </form>
    </section>
  </main>
  <div id="shareModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle"></div>
  <script src="app.js"></script>
  <script>
    (function () {
      var installPrompt = null;
      var btn = document.getElementById('manualInstallBtn');
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        installPrompt = event;
      });
      if (!btn) return;
      btn.addEventListener('click', async function () {
        var isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isInstalled) {
          alert('This rider app is already installed on this device.');
          return;
        }
        if (installPrompt) {
          installPrompt.prompt();
          await installPrompt.userChoice;
          installPrompt = null;
          return;
        }
        alert('Install Rider App instructions:\n\nAndroid Chrome: tap the three-dot menu, then Add to Home screen or Install app.\n\nChrome/Edge on computer: click the install icon in the address bar, or open the browser menu and choose Install page as app.\n\niPhone Safari: tap Share, then Add to Home Screen.');
      });
    })();
  </script>
</body>
</html>
